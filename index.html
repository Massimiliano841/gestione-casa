<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f1420" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Gestione Casa" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Gestione Casa</title>
    <script>
      // Applica il tema salvato prima del render per evitare il flash
      (function () {
        try {
          var t = localStorage.getItem('gestione-casa-theme')
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark'
          }
          document.documentElement.setAttribute('data-theme', t)
          var m = document.querySelector('meta[name="theme-color"]')
          if (m) m.setAttribute('content', t === 'light' ? '#f4f6fb' : '#0f1420')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
