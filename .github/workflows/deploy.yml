name: Deploy su GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        env:
          # Impostati come "Repository secrets" su GitHub
          # (Settings > Secrets and variables > Actions)
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      # A volte Pages risponde "Deployment failed, try again later" (intoppo
      # transitorio lato GitHub). Primo tentativo tollerante: non fa fallire il job.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Attendi prima di riprovare
        if: steps.deployment.outcome == 'failure'
        run: sleep 15

      # Secondo tentativo: se fallisce anche questo, allora il job fallisce davvero.
      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
